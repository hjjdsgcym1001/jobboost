<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JobBoost{% endblock %} - AI 简历优化 & 面试助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                        accent: { 50: '#fdf4ff', 100: '#fae8ff', 200: '#f5d0fe', 300: '#f0abfc', 400: '#e879f9', 500: '#d946ef', 600: '#c026d3', 700: '#a21caf', 800: '#86198f', 900: '#701a75' },
                    }
                }
            }
        }
    </script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="flex items-center space-x-2">
                    <svg class="w-8 h-8" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="navGrad" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#3b82f6"/>
                                <stop offset="100%" stop-color="#d946ef"/>
                            </linearGradient>
                        </defs>
                        <rect width="32" height="32" rx="7" fill="url(#navGrad)"/>
                        <path d="M9 10a1 1 0 011-1h8a1 1 0 011 1v0a1 1 0 01-1 1H10a1 1 0 01-1-1z" fill="#fff" opacity=".85"/>
                        <path d="M9 15a1 1 0 011-1h12a1 1 0 011 1v0a1 1 0 01-1 1H10a1 1 0 01-1-1z" fill="#fff" opacity=".65"/>
                        <path d="M9 20a1 1 0 011-1h10a1 1 0 011 1v0a1 1 0 01-1 1H10a1 1 0 01-1-1z" fill="#fff" opacity=".65"/>
                        <path d="M22 22.5l3-3m0 0-3-3m3 3H15" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-primary-600 to-accent-500 bg-clip-text text-transparent">JobBoost</span>
                </a>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="/" class="text-gray-600 hover:text-primary-600 font-medium transition">首页</a>
                    <a href="/#features" class="text-gray-600 hover:text-primary-600 font-medium transition">功能</a>
                    <a href="/templates" class="text-gray-600 hover:text-primary-600 font-medium transition">模板</a>
                    <a href="/pricing" class="text-gray-600 hover:text-primary-600 font-medium transition">定价</a>
                    <span class="text-gray-300">|</span>
                    <a href="mailto:3125591088@qq.com?subject=JobBoost 意见反馈&body=【问题描述】%0A%0A【功能建议】%0A%0A【联系方式】" class="text-gray-600 hover:text-primary-600 font-medium transition">意见反馈</a>
                </div>
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-gray-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100">
            <div class="px-4 py-3 space-y-2">
                <a href="/" class="block py-2 text-gray-600 hover:text-primary-600">首页</a>
                <a href="/#features" class="block py-2 text-gray-600 hover:text-primary-600">功能</a>
                <a href="/templates" class="block py-2 text-gray-600 hover:text-primary-600">模板</a>
                <a href="/pricing" class="block py-2 text-gray-600 hover:text-primary-600">定价</a>
                <a href="mailto:3125591088@qq.com?subject=JobBoost 意见反馈&body=【问题描述】%0A%0A【功能建议】%0A%0A【联系方式】" class="block py-2 text-gray-600 hover:text-primary-600">意见反馈</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-6xl mx-auto px-4 py-8">
            <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                <div class="flex items-center space-x-2">
                    <svg class="w-6 h-6" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="footerGrad" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#3b82f6"/>
                                <stop offset="100%" stop-color="#d946ef"/>
                            </linearGradient>
                        </defs>
                        <rect width="32" height="32" rx="7" fill="url(#footerGrad)"/>
                        <path d="M9 10a1 1 0 011-1h8a1 1 0 011 1v0a1 1 0 01-1 1H10a1 1 0 01-1-1z" fill="#fff" opacity=".85"/>
                        <path d="M9 15a1 1 0 011-1h12a1 1 0 011 1v0a1 1 0 01-1 1H10a1 1 0 01-1-1z" fill="#fff" opacity=".65"/>
                        <path d="M9 20a1 1 0 011-1h10a1 1 0 011 1v0a1 1 0 01-1 1H10a1 1 0 01-1-1z" fill="#fff" opacity=".65"/>
                        <path d="M22 22.5l3-3m0 0-3-3m3 3H15" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    </div>
                    <span class="text-gray-500 font-semibold">JobBoost</span>
                </div>
                <div class="text-gray-400 text-sm">用 AI 让你的简历更出色</div>
                <div class="text-gray-400 text-sm">&copy; 2026 JobBoost. All rights reserved.</div>
            </div>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>
        // Mobile menu toggle
        document.getElementById('mobile-menu-btn')?.addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    {% block scripts %}{% endblock %}
</body>
</html>
