{% extends "base.html" %}
{% block title %}模板结果{% endblock %}
{% block content %}
<section class="py-12">
    <div class="max-w-4xl mx-auto px-4">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-bold mb-1"><span id="tpl-name"></span></h1>
                <p class="text-gray-500">AI 已根据你的简历内容按此模板重新排版</p>
            </div>
            <div class="flex space-x-3">
                <button id="copy-btn" class="px-5 py-2.5 bg-primary-500 text-white rounded-xl hover:bg-primary-600 transition font-medium">
                    复制全文
                </button>
                <a href="/templates" class="px-5 py-2.5 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition font-medium">
                    返回模板
                </a>
            </div>
        </div>
        <div class="bg-white rounded-2xl border border-gray-200 p-6">
            <pre id="formatted-content" class="text-sm leading-relaxed whitespace-pre-wrap text-gray-700 font-sans max-h-[80vh] overflow-y-auto"></pre>
        </div>
    </div>
</section>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    var content = sessionStorage.getItem("jobboost_formatted");
    var name = sessionStorage.getItem("jobboost_template_name");
    if (content) {
        document.getElementById("formatted-content").textContent = content;
        document.getElementById("tpl-name").textContent = name || "模板结果";
    } else {
        window.location.href = "/templates";
    }
    document.getElementById("copy-btn").onclick = function() {
        navigator.clipboard.writeText(content).then(function() {
            this.textContent = "已复制";
            setTimeout(function() { this.textContent = "复制全文"; }.bind(this), 2000);
        }.bind(this));
    };
});
</script>
{% endblock %}
